default: &default
  adapter: postgresql
  encoding: utf8
  pool: 5
  username: <%= Rails.application.credentials.dig(:db, :username) || ENV['DB_USERNAME'] %>
  password: <%= Rails.application.credentials.dig(:db, :password) || ENV['DB_PASSWORD'] %>
  host: <%= Rails.application.credentials.dig(:db, :host) || ENV['DB_HOST'] %>

development:
  <<: *default
  database: sgtcc_production

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: sgtcc_test

production:
  <<: *default
  database: sgtcc_production
