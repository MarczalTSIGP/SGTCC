name: Tests

on:
  workflow_call:
    secrets:
      MAILER_USERNAME:
        required: true
      MAILER_PASSWORD:
        required: true

jobs:
  run-tests:
    runs-on: ubuntu-latest
    env:
      RAILS_ENV: test
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY_TEST }}
      MAILER_FROM: "Prof. Responsável pelo TCC <tcc-tsi-gp@utfpr.edu.br>"
      APP_HOST: localhost:3000
      LDAP_ON: 'false'
      LDAP_BY: moodle
      LDAP_HOST: localhost
      LDAP_PORT: '3389'
      LDAP_BASE: ''
      FILES_PATH_TO_TEST: /var/www/SGTCC/spec/samples
    container:
      image: ruby:3.4.7
      options: --network-alias testHost
      volumes:
        - /var/www/SGTCC/spec/samples:/var/www/SGTCC/spec/samples
    services:
      db:
        image: postgres:17.5
        ports: [ "5432:5432" ]
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      selenium:
        image: selenium/standalone-chrome-debug:latest
        ports: [ "4444:4444" ]
        volumes:
          - /var/www/SGTCC/spec/samples:/var/www/SGTCC/spec/samples

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install libpq-dev for postgres
        run: |
          apt-get update
          apt-get install -y lsb-release wget ca-certificates gnupg
          echo "deb http://apt.postgresql.org/pub/repos/apt/ $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | gpg --dearmor -o /usr/share/keyrings/postgresql-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql-archive-keyring.gpg] http://apt.postgresql.org/pub/repos/apt/ $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list
          apt-get update -qq
          apt-get install -y postgresql-client

      - name: Cache bundle gems
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-

      - name: Install bundle gems
        run: |
          gem install bundler -v 2.7.2
          bundle config path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Compile assets
        run: |
          bundle exec rails assets:precompile

      - name: Prepare database
        env:
          RAILS_ENV: test
        run: |
          bundle exec rails db:create
          bundle exec rails db:migrate

      - name: Run tests
        env:
          RAILS_ENV: test
          COVERAGE: true
          SELENIUM_HOST: selenium
          SELENIUM_PORT: 4444
          TEST_APP_HOST: testHost
        run: |
          bundle exec rspec spec/